version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: cinema-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: cinema-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://32.236.43.208
    depends_on:
      - redis

  frontend:
    build: 
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://32.236.43.208:5001/api
        - REACT_APP_SOCKET_URL=http://32.236.43.208:5001
        - REACT_APP_PAYOS_CLIENT_ID=3c9b7407-e544-4861-ac15-320e8b2ed32e
        - REACT_APP_PAYOS_API_KEY=fe86b97b-ea26-444f-a89e-2dc7ff388e40
        - REACT_APP_PAYOS_CHECKSUM_KEY=7382c49b6ce4405ec4bc1c9a63cda1fd28c8942b083c2670e302521dcc90d3e5
    container_name: cinema-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
